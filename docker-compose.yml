services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiceo_gateway_lite}
      POSTGRES_USER: ${POSTGRES_USER:-aiceo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiceo} -d ${POSTGRES_DB:-aiceo_gateway_lite}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway-lite:
    image: alpine:3.22
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "-c", "apk add --no-cache ca-certificates tzdata >/dev/null && exec /app/gateway-lite"]
    environment:
      RUN_MODE: gateway-lite
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${GATEWAY_LITE_PORT:-18089}:18089"
    volumes:
      - ./bin/gateway-lite:/app/gateway-lite:ro
      - ./data:/app/data

volumes:
  postgres-data:
  redis-data:
