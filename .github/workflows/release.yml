name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum

      - name: Build embedded frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          out="dist/aiceo-gateway-lite-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -tags embed -trimpath \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }} -X main.Commit=${GITHUB_SHA} -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.BuildType=release" \
            -o "$out" ./cmd/server
          sha256sum "$out" > "$out.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-lite-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: AICEO Gateway Lite ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
